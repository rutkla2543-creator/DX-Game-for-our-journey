<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DXO Guide — DX Journey Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --wood-deep:#2A180C;
    --wood-mid:#3E2412;
    --leather:#5C3A1E;
    --leather-dark:#3B2414;
    --paper:#F4E8C9;
    --paper-dark:#E8D6A3;
    --paper-shadow:#D8C088;
    --border-gold: rgba(184,134,11,0.55);
    --gold: #A9781F;
    --gold-bright: #C99A2E;
    --gold-glow: rgba(230,178,74,0.55);
    --purple: #4B3B7C;
    --purple-soft: rgba(75,59,124,0.28);
    --ink: #3A2A18;
    --ink-muted: #8A6E48;
    --bubble-bot: rgba(255,251,238,0.65);
    --bubble-user: linear-gradient(135deg, #4B3B7C, #6E4FA0);
    --radius: 16px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Sarabun', sans-serif;
    background:
      radial-gradient(ellipse 500px 400px at 20% 15%, rgba(255,196,110,0.25), transparent 60%),
      radial-gradient(ellipse 600px 500px at 85% 80%, rgba(120,70,30,0.25), transparent 60%),
      linear-gradient(160deg, var(--wood-deep) 0%, var(--wood-mid) 50%, #241408 100%);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 12px;
  }

  .app{
    width:100%;
    max-width:460px;
    height:min(760px, 92vh);
    display:flex;
    flex-direction:column;
    background:
      repeating-linear-gradient(0deg, rgba(150,110,60,0.07) 0px, transparent 2px, transparent 4px),
      radial-gradient(ellipse 260px 180px at 12% 8%, rgba(180,140,80,0.18), transparent 60%),
      radial-gradient(ellipse 220px 160px at 90% 90%, rgba(180,140,80,0.15), transparent 60%),
      radial-gradient(ellipse at 30% 0%, rgba(255,255,255,0.35), transparent 55%),
      linear-gradient(160deg, var(--paper) 0%, var(--paper-dark) 100%);
    border:3px solid var(--leather);
    border-radius:14px;
    overflow:hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.65), 0 0 0 6px rgba(92,58,30,0.25), inset 0 0 40px rgba(184,134,11,0.12);
  }

  /* brass corner ornaments, like the book's metal clasps */
  .app{ position:relative; }
  .app::before, .app::after{
    content:"";
    position:absolute;
    width:22px; height:22px;
    border:2px solid var(--gold-bright);
    pointer-events:none;
    z-index:5;
    opacity:0.85;
  }
  .app::before{ top:6px; left:6px; border-right:none; border-bottom:none; border-radius:4px 0 0 0; }
  .app::after{ bottom:6px; right:6px; border-left:none; border-top:none; border-radius:0 0 4px 0; }

  /* ---------- Header ---------- */
  .header{
    position:relative;
    padding:20px 20px 16px;
    background: linear-gradient(135deg, var(--leather), var(--leather-dark));
    border-bottom:2px solid var(--border-gold);
    display:flex;
    align-items:center;
    gap:14px;
  }
  .header::after{
    content:"";
    position:absolute;
    inset:5px;
    border:1px solid rgba(230,178,74,0.35);
    border-radius:4px;
    pointer-events:none;
  }
  .orb{
    position:relative;
    width:46px;height:46px;
    border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #8a5a24, #2a1a0c 70%);
    border:1px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    flex-shrink:0;
    box-shadow: 0 0 18px 4px rgba(255,178,90,0.55);
    animation: pulse 3.2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow: 0 0 12px 2px rgba(255,178,90,0.45); }
    50%{ box-shadow: 0 0 24px 7px rgba(255,178,90,0.7); }
  }
  .header-text .eyebrow{
    font-family:'Cinzel', serif;
    letter-spacing:0.14em;
    font-size:10.5px;
    color:var(--gold-bright);
    text-transform:uppercase;
    margin:0 0 2px;
  }
  .header-text h1{
    margin:0;
    font-size:18px;
    font-weight:700;
    color:#F4E8C9;
    font-family:'Cinzel', serif;
    letter-spacing:0.02em;
  }
  .header-text p{
    margin:2px 0 0;
    font-size:12.5px;
    color:#C9B48A;
  }
  /* ---------- Chat area ---------- */
  .chat{
    flex:1;
    overflow-y:auto;
    padding:18px 16px 8px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .chat::-webkit-scrollbar{width:6px;}
  .chat::-webkit-scrollbar-thumb{background:var(--border-gold); border-radius:10px;}

  .row{ display:flex; width:100%; }
  .row.bot{ justify-content:flex-start; }
  .row.user{ justify-content:flex-end; }

  .bubble{
    max-width:84%;
    padding:12px 14px;
    border-radius:var(--radius);
    font-size:13.6px;
    line-height:1.65;
    white-space:pre-line;
    animation: rise 0.35s ease;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .row.bot .bubble{
    background:var(--bubble-bot);
    border:1px solid var(--border-gold);
    border-bottom-left-radius:6px;
    color:var(--ink);
    box-shadow: 0 2px 8px rgba(90,60,20,0.12);
  }
  .row.bot .bubble b{ color:var(--gold); }
  .row.user .bubble{
    background:var(--bubble-user);
    border-bottom-right-radius:6px;
    color:#F4E8C9;
    font-weight:500;
    box-shadow: 0 2px 10px rgba(75,59,124,0.35);
  }

  .bot-label{
    font-family:'Cinzel', serif;
    font-size:9.5px;
    letter-spacing:0.12em;
    color:var(--gold);
    margin:0 0 4px 2px;
    text-transform:uppercase;
  }

  /* ---------- Options ---------- */
  .options{
    display:flex;
    flex-direction:column;
    gap:8px;
    padding:2px 2px 4px;
  }
  .opt-btn{
    display:flex;
    align-items:center;
    gap:10px;
    text-align:left;
    background:rgba(255,251,238,0.55);
    border:1px solid var(--border-gold);
    color:var(--ink);
    font-family:'Sarabun', sans-serif;
    font-size:13.4px;
    font-weight:500;
    padding:11px 13px;
    border-radius:14px;
    cursor:pointer;
    transition: all 0.18s ease;
  }
  .opt-btn:hover{
    background:rgba(255,251,238,0.85);
    border-color:var(--gold-bright);
    transform:translateX(2px);
    box-shadow:0 0 14px rgba(184,134,11,0.28);
  }
  .opt-btn .ic{ font-size:17px; flex-shrink:0; }

  /* ---------- Footer nav ---------- */
  .footer-nav{
    display:flex;
    gap:8px;
    padding:12px 16px 16px;
    border-top:2px solid var(--border-gold);
    background: linear-gradient(135deg, var(--leather), var(--leather-dark));
  }
  .nav-btn{
    flex:1;
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold-bright);
    font-family:'Sarabun', sans-serif;
    font-size:12.6px;
    font-weight:600;
    padding:9px 10px;
    border-radius:12px;
    cursor:pointer;
    transition: all 0.18s ease;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .nav-btn:hover{ background:rgba(230,178,74,0.18); }
  .nav-btn:disabled{ opacity:0.35; cursor:default; }
  .nav-btn:disabled:hover{ background:transparent; }

  @media (max-width:400px){
    .app{ border-radius:0; height:100vh; max-width:100%; }
    body{ padding:0; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="orb">🧙‍♀️</div>
    <div class="header-text">
      <p class="eyebrow">DX Journey</p>
      <h1>DXO Guide</h1>
      <p>ผู้ช่วยนำทางการใช้งาน SharePoint</p>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="footer-nav">
    <button class="nav-btn" id="backBtn">↩ ย้อนกลับ</button>
    <button class="nav-btn" id="homeBtn">🏠 เมนูหลัก</button>
  </div>
</div>


<script>
const chatEl = document.getElementById('chat');
const backBtn = document.getElementById('backBtn');
const homeBtn = document.getElementById('homeBtn');

// ---------- Content tree ----------
const NODES = {
  root: {
    label: "เริ่มต้น",
    bot: "สวัสดีค่ะ ✨ ยินดีต้อนรับสู่ DX Journey!\nหน้า Home Page โฉมใหม่ออกแบบมาให้ทุกคนผจญภัยได้เต็มที่ค่ะ 🏰\nมี 4 เมนูเฉพาะทางให้เลือกวาร์ปตามความสนใจ:\n\n1️⃣ DX Roadmap & Organization\n2️⃣ DX Program & Project Monitoring\n3️⃣ DX Events & Activities\n4️⃣ DX Training Hub\n\nนอกจากนี้ยังมี:\n📌 บอร์ด Events & Activities Updated — อัปเดตข่าวสารและบทความล่าสุด\n🧙‍♀️ DXO Secretary (เลื่อนลงล่างสุด) — ทีมงานพร้อมให้คำปรึกษา\n💬 ช่องแสดงความคิดเห็น/เสนอ Feature (ด้านบนสุดของหน้า) — เสียงของคุณมีคุณค่าเสมอ!\n\nอยากรู้เรื่องไหนก่อนดี เลือกได้เลยนะคะ 🔮",
    options: [
      { icon:"🗺️", text:"DX Roadmap & Organization", to:"roadmap" },
      { icon:"📅", text:"DX Program & Project Monitoring", to:"program" },
      { icon:"🎪", text:"DX Events & Activities", to:"events" },
      { icon:"📚", text:"DX Training Hub", to:"training" },
      { icon:"🧙‍♀️", text:"ติดต่อทีม DXO Secretary", to:"secretary" },
      { icon:"💬", text:"อยากส่ง Feedback / เสนอ Feature", to:"feedback" },
    ]
  },
  roadmap: {
    label:"DX Roadmap & Organization",
    bot: "📍 หน้านี้จะเป็นการสรุปทิศทาง DX ของบริษัทและภาพรวมกิจกรรมในปี FY2026 ค่ะ\n\n🎯 Key Action in FY2026: เราต้องการที่จะเสริมสร้างการกำกับดูแลกระบวนการปรับเปลี่ยนสู่ดิจิทัล (DX Governance) ให้แข็งแกร่ง, เร่งการดำเนินงานให้รวดเร็วขึ้น, และสร้างขีดความสามารถที่พร้อมสำหรับอนาคต\n\n📊 กิจกรรมหลักและประเด็นสำคัญในปี 2026:\n• Top 3 Priorities: AI / Data Lake / CRM\n• 33 Programs / 132 Projects\n• DX Culture & Change: เป้าหมายผู้เข้าร่วมกิจกรรมที่เกี่ยวข้อง มากกว่า 100 คน และความพึงพอใจ มากกว่า 80%\n• AI Guideline: ประกาศใช้ AI User / AI Provider อย่างเป็นทางการ\n\n🔗 Important Links ที่หาได้จาก DX  Journey SharePoint:\n• DX Action Plan FY2026\n• DX Taskforce Committee\n• DX Behavior Guidebook\n• DX Budget Guideline\n• AI User / AI Provider",
    options: [
      { icon:"🧙‍♀️", text:"ใครอยู่ในทีม DXO Secretary บ้าง", to:"secretary" },
      { icon:"📅", text:"ดูเมนู DX Program & Project Monitoring ต่อ", to:"program" },
    ]
  },
  program: {
    label:"DX Program & Project Monitoring",
    bot: "📍 หน้านี้เป็นศูนย์กลางติดตามความคืบหน้าของ DX Programs และ Projects ทั้งหมด ทุกคนสามารถเข้าไปดูความคืบหน้าและข้อมูลที่เกี่ยวข้องกับโปรเจคต่างๆผ่านเมนูนี้ได้เลยค่ะ\n\n🧰 Tools & Guides:\n• DX Sub-Working Team List\n• DX Budget Guideline\n• Program and Project Progression\n• Summary Report",
    options: [
      { icon:"🎪", text:"ดูเมนู DX Events & Activities ต่อ", to:"events" },
      { icon:"🏰", text:"กลับไปดูเมนูหลัก", to:"root" },
    ]
  },
  events: {
    label:"DX Events & Activities",
    bot: "📍 หน้านี้เรียกอีกชื่อว่า 'DX Promotions' ค่ะ 🎪\n\nเป็นพื้นที่รวมกิจกรรม Digital Transformation ของทั้งองค์กร ทั้งโปสเตอร์ อินโฟกราฟิก และสื่อสื่อสารต่างๆ ที่เกี่ยวข้อง — เพื่อนๆสามารถแวะมาตามอัปเดตกิจกรรมล่าสุดได้ที่นี่เลยค่ะ ✨",
    options: [
      { icon:"📚", text:"ดูเมนู DX Training Hub ต่อ", to:"training" },
      { icon:"🏰", text:"กลับไปดูเมนูหลัก", to:"root" },
    ]
  },
  training: {
    label:"DX Training Hub",
    bot: "📍 หน้านี้คือ 'All about DX' หรือ DX Training Hub ออกแบบมาเพื่อช่วยให้ทุกคนเข้าใจและนำแนวคิด DX ไปใช้ในงานประจำวันได้จริงค่ะ โดยเราจะมี Program Training ให้ทุกคนได้เข้ามาเรียน  📚\n\n🎓 Program Training on HCM:\n• Digital Transformation Training Program — สำหรับผู้บริหารทุกระดับ (All managers level)\n• Operational Excellence (OE) Guide — สำหรับ Non-management level (R5-12)\n• Operational Excellence (OE) Guide — สำหรับ Management level (JG, JM)\n\n📖 Internal Learning:\n• Basic of DX: 'Introduce AJT's DX' — เรียนรู้พื้นฐาน DX และเส้นทาง DX Journey ตั้งแต่ DX1.0–DX4.0\n\n🌐 External Training & Seminar: รวมคอร์สและสัมมนาภายนอกที่น่าสนใจเพิ่มเติม",
    options: [
      { icon:"🗺️", text:"ดูเมนู DX Roadmap & Organization ต่อ", to:"roadmap" },
      { icon:"🏰", text:"กลับไปดูเมนูหลัก", to:"root" },
    ]
  },
  secretary: {
    label:"DXO Secretary",
    bot: "🧙‍♀️ หากหลงทางในดินแดน DX ทีม DXO Secretary พร้อมให้คำแนะนำและช่วยเหลือคุณในทุกย่างก้าวเสมอค่ะ ติดต่อได้ที่:\n\n🔮 CPD TOP-San — Apichart Aneckvanich\n🔮 CPD Noon-San — Itsaraphon Sirichaipan\n🔮 CPD Klao-San — Ratklao Chaiyot\n🔮 CPD Baitong-San — Nicharee Aramrungrojchai\n\nเลื่อนลงล่างสุดของหน้า Homepage เพื่อดูช่องทางติดต่อทีมงานแบบเต็มๆ ได้เลยค่ะ",
    options: [
      { icon:"💬", text:"อยากส่ง Feedback / เสนอ Feature", to:"feedback" },
      { icon:"🏰", text:"กลับไปดูเมนูหลัก", to:"root" },
    ]
  },
  feedback: {
    label:"Feedback",
    bot: "💬 เราเปิดรับฟังเสียงของทุกคนเสมอค่ะ! ที่ด้านบนสุดของหน้า Homepage คุณสามารถ:\n• กดแสดงความคิดเห็นเกี่ยวกับการใช้งาน\n• เสนอ Feature ใหม่ที่อยากให้มี\n\nถ้าไอเดียของใครน่าสนใจและถูกนำไปพัฒนาใช้จริง มีของรางวัลรออยู่ด้วยนะคะ 🎁\nเพราะเสียงของคุณมีคุณค่าเสมอ สำหรับการขับเคลื่อนองค์กรสู่ Digital Transformation ✨",
    options: [
      { icon:"🧙‍♀️", text:"ติดต่อทีม DXO Secretary", to:"secretary" },
      { icon:"🏰", text:"กลับไปดูเมนูหลัก", to:"root" },
    ]
  },
};

let history = ["root"];

function render(nodeKey, userChoiceLabel){
  const node = NODES[nodeKey];

  if(userChoiceLabel){
    const urow = document.createElement('div');
    urow.className = 'row user';
    urow.innerHTML = `<div class="bubble">${userChoiceLabel}</div>`;
    chatEl.appendChild(urow);
  }

  const brow = document.createElement('div');
  brow.className = 'row bot';
  const wrap = document.createElement('div');
  wrap.style.maxWidth = '84%';
  wrap.innerHTML = `<p class="bot-label">DXO Guide</p>`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.style.maxWidth = '100%';
  bubble.textContent = node.bot;
  wrap.appendChild(bubble);
  brow.appendChild(wrap);
  chatEl.appendChild(brow);

  const optWrap = document.createElement('div');
  optWrap.className = 'options';
  node.options.forEach(opt=>{
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.innerHTML = `<span class="ic">${opt.icon}</span><span>${opt.text}</span>`;
    b.onclick = ()=>{
      // remove existing option buttons so history stays clean
      document.querySelectorAll('.options').forEach(o=>o.remove());
      history.push(opt.to);
      updateNavButtons();
      render(opt.to, opt.text);
      scrollToBottom();
    };
    optWrap.appendChild(b);
  });
  chatEl.appendChild(optWrap);
  scrollToBottom();
}

function scrollToBottom(){
  requestAnimationFrame(()=>{ chatEl.scrollTop = chatEl.scrollHeight; });
}

function updateNavButtons(){
  backBtn.disabled = history.length <= 1;
  homeBtn.disabled = history[history.length-1] === 'root';
}

backBtn.onclick = ()=>{
  if(history.length <= 1) return;
  history.pop();
  const prev = history[history.length-1];
  chatEl.innerHTML = '';
  render(prev);
  updateNavButtons();
};

homeBtn.onclick = ()=>{
  history = ['root'];
  chatEl.innerHTML = '';
  render('root');
  updateNavButtons();
};

// init
render('root');
updateNavButtons();
</script>

</body>
</html>
